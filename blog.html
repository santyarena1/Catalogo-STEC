<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | Crestron Home Argentina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="admin.css">
  <link rel="stylesheet" href="annotations.css">
  <style>
    .blog-page-hero {
      background: var(--hero-bg);
      padding: 120px 0 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .blog-page-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,157,199,0.12) 0%, transparent 70%);
    }
    .blog-page-hero h1 { font-size: clamp(2rem,5vw,3.2rem); font-weight: 800; color: #fff; margin-bottom: 16px; position: relative; }
    .blog-page-hero p { font-size: 1.1rem; color: rgba(255,255,255,0.65); position: relative; }
    .blog-page-hero .blog-back { position: absolute; top: 88px; left: 40px; color: rgba(255,255,255,0.55); font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: color .2s; }
    .blog-page-hero .blog-back:hover { color: #fff; }

    .blog-page-body { padding: 80px 0 120px; background: var(--bg-light); }

    .blog-filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 48px;
      align-items: center;
    }
    .blog-filter-bar input[type="search"] {
      flex: 1;
      min-width: 200px;
      padding: 10px 16px;
      border: 1.5px solid var(--border-med);
      border-radius: 100px;
      font-size: 14px;
      font-family: var(--font);
      background: #fff;
    }
    .blog-filter-bar input:focus { border-color: var(--accent); outline: none; }
    .blog-cat-btn {
      padding: 8px 18px;
      border-radius: 100px;
      border: 1.5px solid var(--border-med);
      background: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      color: var(--text-medium);
      transition: all .2s;
    }
    .blog-cat-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .blog-full-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
    }
    .blog-empty { text-align: center; padding: 80px 0; color: var(--text-light); font-size: 15px; grid-column: 1/-1; }

    /* Article Reader overlay */
    .article-reader-overlay {
      position: fixed; inset: 0;
      background: rgba(7,21,37,0.92);
      backdrop-filter: blur(12px);
      z-index: 90000;
      display: none;
      overflow-y: auto;
      padding: 40px 20px;
    }
    .article-reader-inner {
      background: #fff;
      border-radius: 20px;
      max-width: 760px;
      margin: 0 auto;
      overflow: hidden;
    }
    .article-reader-header-img {
      height: 320px;
      background: linear-gradient(135deg, var(--hero-bg), #1a4060);
      background-size: cover;
      background-position: center;
    }
    .article-reader-body { padding: 40px 48px 56px; }
    .article-reader-body .article-cat { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .08em; }
    .article-reader-body h1 { font-size: clamp(1.5rem,3vw,2.2rem); font-weight: 800; color: var(--text-dark); margin: 14px 0 8px; line-height: 1.3; }
    .article-reader-body .article-date { font-size: 13px; color: var(--text-light); margin-bottom: 28px; display: block; }
    .article-reader-body .article-content { font-size: 16px; line-height: 1.85; color: var(--text-medium); white-space: pre-line; }
    .article-reader-body .article-content img { max-width: 100%; border-radius: 10px; margin: 16px 0; }
    .article-close-btn {
      position: fixed;
      top: 20px; right: 20px;
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(6px);
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 50%;
      cursor: pointer;
      color: #fff;
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      z-index: 2;
    }
    @media (max-width: 768px) {
      .blog-page-hero .blog-back { top: 24px; left: 20px; }
      .blog-full-grid { grid-template-columns: 1fr; }
      .article-reader-body { padding: 24px 24px 40px; }
    }
  </style>
</head>
<body>
  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-outline" id="cursorOutline"></div>

  <!-- ===== HERO ===== -->
  <div class="blog-page-hero">
    <a href="index.html" class="blog-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
      Volver al inicio
    </a>
    <div class="container">
      <div class="section-label" style="color:rgba(0,157,199,0.9);margin-bottom:16px;">Blog</div>
      <h1>Novedades y tendencias<br>en automatización.</h1>
      <p>Artículos sobre domótica, tecnología y la plataforma Crestron Home.</p>
    </div>
  </div>

  <!-- ===== CONTENT ===== -->
  <div class="blog-page-body">
    <div class="container">
      <div class="blog-filter-bar">
        <input type="search" id="blogSearch" placeholder="Buscar artículos...">
        <button class="blog-cat-btn active" data-cat="all">Todos</button>
        <button class="blog-cat-btn" data-cat="Plataforma">Plataforma</button>
        <button class="blog-cat-btn" data-cat="Instalación">Instalación</button>
        <button class="blog-cat-btn" data-cat="Comparativas">Comparativas</button>
        <button class="blog-cat-btn" data-cat="Novedades">Novedades</button>
        <button class="blog-cat-btn" data-cat="Casos de éxito">Casos de éxito</button>
      </div>
      <div class="blog-full-grid" id="blogFullGrid"></div>
    </div>
  </div>

  <!-- Article Reader -->
  <div class="article-reader-overlay" id="articleReaderOverlay">
    <button class="article-close-btn" id="articleCloseBtn">✕</button>
    <div class="article-reader-inner" id="articleReaderInner"></div>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
  <script src="admin.js"></script>
  <script src="annotations.js"></script>
  <script src="blog.js"></script>
</body>
</html>
